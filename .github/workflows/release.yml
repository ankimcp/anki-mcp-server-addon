name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          pip install pytest

      - name: Pull headless-anki image
        run: |
          docker pull ghcr.io/ankimcp/headless-anki:qt-vnc-v1.0.0

      - name: Run E2E tests (regular)
        run: |
          make e2e-full

      - name: Run E2E tests (filtered)
        run: |
          make e2e-filtered

      - name: Show container logs on failure
        if: failure()
        working-directory: .docker
        run: |
          docker compose logs 2>/dev/null || true
          docker compose -f docker-compose.filtered.yml logs 2>/dev/null || true

      - name: Stop all containers
        if: always()
        working-directory: .docker
        run: |
          docker compose down 2>/dev/null || true
          docker compose -f docker-compose.filtered.yml down 2>/dev/null || true

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build addon
        run: ./package.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '*.ankiaddon'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
